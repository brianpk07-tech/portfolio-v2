<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 90" width="100%" height="100%">
  <!-- Style pour l'effet tracé à la main -->
  <style>
    .signature {
      fill: none;
      stroke: #ffffff;
      stroke-width: 2.2;
      stroke-linecap: round;
      stroke-linejoin: round;
      opacity: 0.95;
    }
  </style>

  <!-- Tracé manuscrit pour "Brian" -->
  <g class="signature">
    <!-- Le B majuscule avec sa grande boucle montante et sa liaison basse -->
    <path d="M 25 75 C 22 45, 28 15, 38 12 C 45 10, 52 22, 45 35 C 38 48, 55 52, 50 68 C 47 78, 32 80, 28 72 C 25 65, 38 68, 48 68" />
    
    <!-- Liaison et boucle du r -->
    <path d="M 48 68 C 55 68, 58 55, 62 55 C 65 55, 64 62, 68 68" />
    
    <!-- Le i et son point -->
    <path d="M 68 68 C 72 68, 75 58, 78 54 C 80 56, 78 64, 82 68" />
    <circle cx="79" cy="46" r="1.5" fill="#ffffff" />
    
    <!-- Le a avec sa boucle fermée et sa canne -->
    <path d="M 94 58 C 94 52, 85 54, 85 62 C 85 70, 94 69, 94 63 C 94 57, 95 68, 99 68" />
    
    <!-- Le n final qui s'étire de manière fluide vers la droite -->
    <path d="M 99 68 C 103 68, 104 56, 109 56 C 114 56, 112 68, 118 68 C 126 68, 145 62, 175 60" />
  </g>
</svg>
